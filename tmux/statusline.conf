# ==========================# ==========================================
# ステータスバー全体の背景を完全に透明化
# ==========================================
# ステータスバーだけでなく、各ウィンドウ領域の背景も default に強制します。
# 'none' を指定することで、不要な装飾（dim等）の継承をリセットします。
set -g status-style "bg=default"
set -g window-status-style "bg=default,none"
set -g window-status-activity-style "bg=default,none"

# ==========================================
# Colors (画像から近似したHEXコード)
# ==========================================
# テキスト(黒)  : #1d2021
# クリーム色    : #f4f0d8
# グレー        : #9ca5a5
# イエロー      : #d7a332
# ブルー        : #3b8eed
# テキスト(白)  : #ffffff

# ==========================================
# Window Status のフォーマット更新
# ==========================================
# 属性の先頭に `none` を追加し、非アクティブウィンドウの暗色化を確実に防ぎます。

# ==========================================
# Left Status: [ セッション:ウィンドウ.ペイン | ホスト名 ]
# ==========================================
set -g status-left-length 100
# クリーム色の角丸 -> クリーム背景で番号 -> グレー背景でホスト名 -> グレーの角丸 -> 空白
set -g status-left "#[fg=#f4f0d8,bg=default]#[bg=#f4f0d8,fg=#1d2021,bold] #S:#I.#P #[bg=#9ca5a5,fg=#1d2021,bold] #h #[fg=#9ca5a5,bg=default] "

# 非アクティブウィンドウ
set -g window-status-format "#[fg=#d7a332,bg=default,none]#[bg=#d7a332,fg=#1d2021,bold] #I #[bg=#9ca5a5,fg=#1d2021,none] #{b:pane_current_path} #[fg=#9ca5a5,bg=default,none] "

# アクティブウィンドウ
set -g window-status-current-format "#[fg=#3b8eed,bg=default,none]#[bg=#3b8eed,fg=#ffffff,bold] #I #[bg=#f4f0d8,fg=#1d2021,bold] #{b:pane_current_path} #[fg=#f4f0d8,bg=default,none] "

# ==========================================
# Right Status: [ 任意のテキスト ]
# ==========================================
set -g status-right-length 100
# 画像の右端に見えるテキスト（適宜書き換えてください）
set -g status-right "#[fg=#9ca5a5,bg=default]#[bg=#9ca5a5,fg=#1d2021,bold] craftzdog-max #[fg=#9ca5a5,bg=default]"
